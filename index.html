<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

.title {
    text-align: center;
    font-size: 48px;
    font-weight: 800;
    color: #1f3b73;
    margin-top: 30px;
}

.wrapper {
    width: 80%;
    margin: auto;
    position: relative;
}

/* AXIS LABELS */
.left-axis {
    position: absolute;
    left: -95px;
    top: 240px;
    transform: rotate(-90deg);
    font-weight: bold;
    color: #1f3b73;
}

.right-axis {
    position: absolute;
    right: -120px;
    top: 240px;
    transform: rotate(90deg);
    font-weight: bold;
    color: #1f3b73;
}

/* AXIS TICKS */
.y-left, .y-right {
    position: absolute;
    top: 40px;
    height: 440px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
}

.y-left { left: -45px; }
.y-right { right: -60px; }

/* GRID SYSTEM */
.grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
}

/* CHART */
.chart {
    height: 440px;
    border-left: 2px solid #bbb;
    border-bottom: 2px solid #bbb;
    border-right: 2px solid #bbb; /* RIGHT AXIS LINE */
    margin-top: 40px;
    padding: 20px 10px;

    /* HORIZONTAL GRIDLINES */
    background-image: linear-gradient(to top, #e6e6e6 1px, transparent 1px);
    background-size: 100% 80px;
}

/* BAR */
.bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
}

.fill {
    width: 60%;
    border-radius: 5px;
}

.alt { background: #2f66c0; }
.base { background: #b7c6d9; }

.label {
    font-weight: bold;
    margin-bottom: 6px;
    font-size: 14px;
}

/* TABLE */
.bottom {
    margin-top: 12px;
}

.cell {
    text-align: center;
    padding: 10px;
    border: 1px solid #bbb;
}

.value {
    font-weight: bold;
    color: #1f3b73;
    font-size: 18px;
}

/* GROUP BOXES */
.group-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    margin-top: -1px;
}

.group-box {
    border: 1px solid #bbb;
    text-align: center;
    padding: 12px 0;
    font-weight: 800;
    font-size: 18px;
}

/* FOOTER */
.bottom-title {
    text-align: center;
    margin-top: 12px;
    font-weight: bold;
    color: #1f3b73;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="wrapper">

<div class="left-axis">NUMBER OF ROADS</div>
<div class="right-axis">% OF PETERSBURG ROADS</div>

<div class="y-left">
    <div>1600</div>
    <div>1200</div>
    <div>800</div>
    <div>400</div>
    <div>0</div>
</div>

<div class="y-right">
    <div>80%</div>
    <div>60%</div>
    <div>40%</div>
    <div>20%</div>
    <div>0%</div>
</div>

<!-- CHART -->
<div class="chart grid" id="chart"></div>

<!-- TABLE -->
<div class="bottom grid" id="table"></div>

<!-- GROUP BOXES -->
<div class="group-row">
    <div class="group-box">FEMA</div>
    <div class="group-box">FATHOM</div>
    <div class="group-box">DCR</div>
</div>

<div class="bottom-title">ROADS ON FLOOD PLAIN BY RISK</div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const chart = document.getElementById("chart");
    const table = document.getElementById("table");

    const values = data.groups.flatMap(g => g.items.map(i => i.value));
    const max = Math.max(...values);

    data.groups.forEach(group => {

        group.items.forEach(item => {

            const bar = document.createElement("div");
            bar.className = "bar";

            const label = document.createElement("div");
            label.className = "label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            const fill = document.createElement("div");
            fill.className = "fill " + item.type;
            fill.style.height = (item.value / max) * 380 + "px";

            bar.appendChild(label);
            bar.appendChild(fill);
            chart.appendChild(bar);

            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerHTML = `
                <div class="value">${item.value}</div>
                <div>${item.risk}</div>
            `;
            table.appendChild(cell);

        });

    });

});
</script>

</body>
</html>
