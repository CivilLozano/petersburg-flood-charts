<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
}

.title {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #1f3b73;
    margin-top: 30px;
}

.chart-wrapper {
    width: 90%;
    margin: auto;
    margin-top: 40px;
    position: relative;
}

.chart {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 420px;
    border-left: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
    padding: 20px;
}

/* bars */
.bar {
    width: 12%;
    text-align: center;
}

.fill {
    width: 100%;
    border-radius: 6px;
}

/* colors */
.base { background: #b7c6d9; }
.alt { background: #2f66c0; }

/* labels ABOVE bars */
.top-label {
    font-weight: bold;
    margin-bottom: 8px;
}

/* bottom panel */
.bottom-panel {
    display: flex;
    margin-top: 20px;
    border: 1px solid #ccc;
}

.cell {
    flex: 1;
    text-align: center;
    padding: 15px 5px;
    border-right: 1px solid #ccc;
}

.cell:last-child {
    border-right: none;
}

.value {
    font-weight: bold;
    font-size: 20px;
    color: #1f3b73;
}

.group-row {
    display: flex;
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}

/* axis labels */
.left-axis {
    position: absolute;
    left: -70px;
    top: 150px;
    transform: rotate(-90deg);
    font-weight: bold;
    color: #1f3b73;
}

.right-axis {
    position: absolute;
    right: -80px;
    top: 150px;
    transform: rotate(90deg);
    font-weight: bold;
    color: #1f3b73;
}

.bottom-title {
    text-align: center;
    font-weight: bold;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="chart-wrapper">

<div class="left-axis">NUMBER OF ROADS</div>
<div class="right-axis">% OF PETERSBURG ROADS</div>

<div class="chart" id="chart"></div>

<div class="bottom-panel" id="table"></div>
<div class="group-row" id="groups"></div>

<div class="bottom-title">ROADS ON FLOOD PLAIN BY RISK</div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const chart = document.getElementById("chart");
    const table = document.getElementById("table");
    const groups = document.getElementById("groups");

    data.groups.forEach(group => {

        group.items.forEach(item => {

            // BAR
            const bar = document.createElement("div");
            bar.className = "bar";

            const label = document.createElement("div");
            label.className = "top-label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            const max = Math.max(...data.groups.flatMap(g => g.items.map(i => i.value)));
fill.style.height = (item.value / max) * 350 + "px";

            bar.appendChild(label);
            bar.appendChild(fill);
            chart.appendChild(bar);

            // TABLE CELL
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerHTML = `
                <div class="value">${item.value}</div>
                <div>${item.risk}</div>
            `;
            table.appendChild(cell);

        });

        // GROUP LABEL
        const g = document.createElement("div");
        g.style.flex = "1";
        g.innerText = group.name;
        groups.appendChild(g);

    });

});
</script>

</body>
</html>
