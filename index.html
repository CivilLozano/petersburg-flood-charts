<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #1f3b73;
    margin-top: 30px;
}

/* WRAPPER */
.wrapper {
    width: 90%;
    margin: auto;
    position: relative;
}

/* CHART */
.chart {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 460px;
    border-left: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
    padding: 20px;
    margin-top: 30px;
}

/* BAR */
.bar {
    width: 12%;
    text-align: center;
}

/* BAR COLORS */
.fill {
    width: 100%;
    border-radius: 6px;
}

.base { background: #b7c6d9; }
.alt { background: #2f66c0; }

/* LABEL ABOVE BAR */
.label {
    font-weight: bold;
    margin-bottom: 6px;
}

/* TABLE */
.bottom {
    display: flex;
    margin-top: 10px;
    border: 1px solid #ccc;
}

.cell {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-right: 1px solid #ccc;
}

.cell:last-child {
    border-right: none;
}

.value {
    font-weight: bold;
    color: #1f3b73;
}

/* GROUP LABELS */
.groups {
    display: flex;
    margin-top: 8px;
    font-weight: bold;
    text-align: center;
}

/* AXIS */
.left-axis {
    position: absolute;
    left: -70px;
    top: 190px;
    transform: rotate(-90deg);
    font-weight: bold;
    color: #1f3b73;
}

.right-axis {
    position: absolute;
    right: -90px;
    top: 190px;
    transform: rotate(90deg);
    font-weight: bold;
    color: #1f3b73;
}

/* BOTTOM TITLE */
.bottom-title {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="wrapper">

<div class="left-axis">NUMBER OF ROADS</div>
<div class="right-axis">% OF PETERSBURG ROADS</div>

<div class="chart" id="chart"></div>
<div class="bottom" id="table"></div>
<div class="groups" id="groups"></div>

<div class="bottom-title">ROADS ON FLOOD PLAIN BY RISK</div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const chart = document.getElementById("chart");
    const table = document.getElementById("table");
    const groups = document.getElementById("groups");

    // 🔥 dynamic max scaling
    const allValues = data.groups.flatMap(g => g.items.map(i => i.value));
    const max = Math.max(...allValues);

    data.groups.forEach(group => {

        group.items.forEach(item => {

            // BAR
            const bar = document.createElement("div");
            bar.className = "bar";

            const label = document.createElement("div");
            label.className = "label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            const fill = document.createElement("div");
            fill.className = "fill " + item.type;

            // ✅ final scaling
            fill.style.height = (item.value / max) * 420 + "px";

            bar.appendChild(label);
            bar.appendChild(fill);
            chart.appendChild(bar);

            // TABLE
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerHTML = `
                <div class="value">${item.value}</div>
                <div>${item.risk}</div>
            `;
            table.appendChild(cell);

        });

        // GROUP LABEL (spans 2 bars)
        const g = document.createElement("div");
        g.style.flex = "2";
        g.innerText = group.name;
        groups.appendChild(g);

    });

});
</script>

</body>
</html>
