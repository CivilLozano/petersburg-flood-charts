<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
}

.title {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #1f3b73;
    margin-top: 30px;
}

.wrapper {
    width: 90%;
    margin: auto;
    position: relative;
}

/* AXIS LABELS */
.left-axis, .right-axis {
    position: absolute;
    top: 200px;
    font-weight: bold;
    color: #1f3b73;
}

.left-axis {
    left: -80px;
    transform: rotate(-90deg);
}

.right-axis {
    right: -110px;
    transform: rotate(90deg);
}

/* AXIS TICKS */
.y-axis {
    position: absolute;
    left: -40px;
    top: 0;
    height: 450px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
}

.y-axis-right {
    position: absolute;
    right: -60px;
    top: 0;
    height: 450px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
}

/* CHART */
.chart {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 450px;
    border-left: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
    padding: 20px 40px;
    margin-top: 40px;
}

/* BAR */
.bar {
    width: 10%;
    text-align: center;
}

.fill {
    width: 100%;
    border-radius: 6px;
}

.base { background: #b7c6d9; }
.alt { background: #2f66c0; }

.label {
    font-weight: bold;
    margin-bottom: 6px;
}

/* BOTTOM PANEL */
.bottom {
    display: flex;
    margin-top: 10px;
    border: 1px solid #ccc;
}

.cell {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-right: 1px solid #ccc;
}

.cell:last-child {
    border-right: none;
}

.value {
    font-weight: bold;
    color: #1f3b73;
}

/* GROUP BOXES */
.group-row {
    display: flex;
    margin-top: 5px;
}

.group-box {
    flex: 2;
    text-align: center;
    font-weight: bold;
    padding-top: 5px;
}

/* BOTTOM TITLE */
.bottom-title {
    text-align: center;
    margin-top: 12px;
    font-weight: bold;
    color: #1f3b73;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="wrapper">

<div class="left-axis">NUMBER OF ROADS</div>
<div class="right-axis">% OF PETERSBURG ROADS</div>

<!-- LEFT AXIS VALUES -->
<div class="y-axis">
    <div>1400</div>
    <div>1000</div>
    <div>600</div>
    <div>200</div>
    <div>0</div>
</div>

<!-- RIGHT AXIS VALUES -->
<div class="y-axis-right">
    <div>80%</div>
    <div>60%</div>
    <div>40%</div>
    <div>20%</div>
    <div>0%</div>
</div>

<div class="chart" id="chart"></div>

<div class="bottom" id="table"></div>

<div class="group-row">
    <div class="group-box">FEMA</div>
    <div class="group-box">FATHOM</div>
    <div class="group-box">DCR</div>
</div>

<div class="bottom-title">ROADS ON FLOOD PLAIN BY RISK</div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const chart = document.getElementById("chart");
    const table = document.getElementById("table");

    const allValues = data.groups.flatMap(g => g.items.map(i => i.value));
    const max = Math.max(...allValues);

    data.groups.forEach(group => {

        group.items.forEach(item => {

            const bar = document.createElement("div");
            bar.className = "bar";

            const label = document.createElement("div");
            label.className = "label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            const fill = document.createElement("div");
            fill.className = "fill " + item.type;
            fill.style.height = (item.value / max) * 420 + "px";

            bar.appendChild(label);
            bar.appendChild(fill);
            chart.appendChild(bar);

            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerHTML = `
                <div class="value">${item.value}</div>
                <div>${item.risk}</div>
            `;
            table.appendChild(cell);

        });

    });

});
</script>

</body>
</html>
