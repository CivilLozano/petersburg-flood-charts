<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

.title {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #1f3b73;
    margin-top: 30px;
}

.wrapper {
    width: 80%;
    margin: auto;
    position: relative;
}

/* AXIS LABELS */
.left-axis {
    position: absolute;
    left: -95px;
    top: 230px;
    transform: rotate(-90deg);
    font-weight: bold;
    color: #1f3b73;
}

.right-axis {
    position: absolute;
    right: -115px;
    top: 230px;
    transform: rotate(90deg);
    font-weight: bold;
    color: #1f3b73;
}

/* AXIS TICKS */
.y-left, .y-right {
    position: absolute;
    top: 40px;
    height: 440px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
    color: #444;
}

.y-left { left: -45px; }
.y-right { right: -55px; }

/* GRID SYSTEM — THIS FIXES ALIGNMENT */
.grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    column-gap: 20px;
}

/* CHART */
.chart {
    height: 440px;
    border-left: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
    padding: 20px 10px;
    margin-top: 40px;
}

/* BAR */
.bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
}

.fill {
    width: 70%;
    border-radius: 5px;
}

.alt { background: #2f66c0; }
.base { background: #b7c6d9; }

.label {
    font-weight: bold;
    margin-bottom: 6px;
    font-size: 13px;
}

/* TABLE */
.bottom {
    margin-top: 12px;
    border-top: 1px solid #ccc;
}

.cell {
    text-align: center;
    padding: 8px;
    border-right: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
}

.cell:last-child {
    border-right: none;
}

.value {
    font-weight: bold;
    color: #1f3b73;
}

/* GROUP LABELS */
.groups {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    margin-top: 5px;
    text-align: center;
    font-weight: bold;
}

/* FOOTER */
.bottom-title {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
    color: #1f3b73;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="wrapper">

<div class="left-axis">NUMBER OF ROADS</div>
<div class="right-axis">% OF PETERSBURG ROADS</div>

<div class="y-left">
    <div>1400</div>
    <div>1000</div>
    <div>600</div>
    <div>200</div>
    <div>0</div>
</div>

<div class="y-right">
    <div>80%</div>
    <div>60%</div>
    <div>40%</div>
    <div>20%</div>
    <div>0%</div>
</div>

<!-- CHART GRID -->
<div class="chart grid" id="chart"></div>

<!-- TABLE GRID -->
<div class="bottom grid" id="table"></div>

<div class="groups">
    <div>FEMA</div>
    <div>FATHOM</div>
    <div>DCR</div>
</div>

<div class="bottom-title">ROADS ON FLOOD PLAIN BY RISK</div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const chart = document.getElementById("chart");
    const table = document.getElementById("table");

    const values = data.groups.flatMap(g => g.items.map(i => i.value));
    const max = Math.max(...values);

    data.groups.forEach(group => {

        group.items.forEach(item => {

            // BAR
            const bar = document.createElement("div");
            bar.className = "bar";

            const label = document.createElement("div");
            label.className = "label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            const fill = document.createElement("div");
            fill.className = "fill " + item.type;
            fill.style.height = (item.value / max) * 380 + "px";

            bar.appendChild(label);
            bar.appendChild(fill);
            chart.appendChild(bar);

            // TABLE CELL (aligned via grid)
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerHTML = `
                <div class="value">${item.value}</div>
                <div>${item.risk}</div>
            `;
            table.appendChild(cell);

        });

    });

});
</script>

</body>
</html>
