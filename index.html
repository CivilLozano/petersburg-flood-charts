<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
}

.title {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #1f3b73;
    margin-top: 30px;
}

.wrapper {
    width: 85%;
    margin: auto;
}

/* CHART */
.chart {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 420px;
    border-left: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
    padding: 20px;
    margin-top: 40px;
}

/* BARS */
.bar {
    width: 9%;
    text-align: center;
}

.fill {
    width: 100%;
    border-radius: 6px;
}

.base { background: #b7c6d9; }
.alt { background: #2f66c0; }

.label {
    font-weight: bold;
    margin-bottom: 6px;
}

/* TABLE */
.bottom {
    display: flex;
    margin-top: 15px;
    border: 1px solid #ccc;
}

.cell {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-right: 1px solid #ccc;
}

.cell:last-child {
    border-right: none;
}

.value {
    font-weight: bold;
    color: #1f3b73;
}

/* GROUP LABELS */
.groups {
    display: flex;
    margin-top: 5px;
    font-weight: bold;
    text-align: center;
}

.group {
    flex: 2;
}

/* BOTTOM TITLE */
.bottom-title {
    text-align: center;
    margin-top: 12px;
    font-weight: bold;
    color: #1f3b73;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="wrapper">

<div class="chart" id="chart"></div>

<div class="bottom" id="table"></div>

<div class="groups">
    <div class="group">FEMA</div>
    <div class="group">FATHOM</div>
    <div class="group">DCR</div>
</div>

<div class="bottom-title">ROADS ON FLOOD PLAIN BY RISK (mi^2)</div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const chart = document.getElementById("chart");
    const table = document.getElementById("table");

    const values = data.groups.flatMap(g => g.items.map(i => i.value));
    const max = Math.max(...values);

    data.groups.forEach(group => {

        group.items.forEach(item => {

            const bar = document.createElement("div");
            bar.className = "bar";

            const label = document.createElement("div");
            label.className = "label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            const fill = document.createElement("div");
            fill.className = "fill " + item.type;

            fill.style.height = (item.value / max) * 380 + "px";

            bar.appendChild(label);
            bar.appendChild(fill);
            chart.appendChild(bar);

            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerHTML = `
                <div class="value">${item.value}</div>
                <div>${item.risk}</div>
            `;
            table.appendChild(cell);

        });

    });

});
</script>

</body>
</html>
