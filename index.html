<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flood Charts</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

.title {
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    color: #1f3b73;
    margin-top: 30px;
}

.chart {
    width: 90%;
    margin: auto;
    margin-top: 40px;
}

.bar-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 400px;
    border-left: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
    padding: 20px;
}

.bar {
    width: 12%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.bar-fill {
    width: 100%;
    border-radius: 4px;
}

.bar-label {
    margin-top: 10px;
    font-weight: bold;
}

.bottom {
    display: flex;
    justify-content: space-around;
    margin-top: 30px;
    font-size: 18px;
}

.group {
    text-align: center;
}
</style>
</head>

<body>

<div class="title">ROADS ON FLOOD PLAINS</div>

<div class="chart">

<div class="bar-container" id="bars"></div>

<div class="bottom" id="groups"></div>

</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

    const container = document.getElementById("bars");
    const groups = document.getElementById("groups");

    data.groups.forEach(group => {

        group.items.forEach(item => {

            const bar = document.createElement("div");
            bar.className = "bar";

            const fill = document.createElement("div");
            fill.className = "bar-fill";
            fill.style.height = item.percent * 4 + "px";

            // alternating colors (same logic as your graphics)
            fill.style.background = item.type === "base"
                ? "#b0c4de"
                : "#2f66c0";

            const label = document.createElement("div");
            label.className = "bar-label";
            label.innerHTML = item.value + "<br>(" + item.percent + "%)";

            bar.appendChild(fill);
            bar.appendChild(label);
            container.appendChild(bar);

        });

        const g = document.createElement("div");
        g.className = "group";
        g.innerText = group.name;
        groups.appendChild(g);

    });

});
</script>

</body>
</html>
