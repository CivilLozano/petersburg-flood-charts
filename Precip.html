<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Precipitation Chart</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

.title {
    text-align: center;
    font-size: 42px;
    font-weight: 800;
    color: #1f3b73;
    margin-top: 20px;
}

.wrapper {
    width: 80%;
    margin: auto;
    position: relative;
}

/* AXIS LABELS */
.left-axis {
    position: absolute;
    left: -100px;
    top: 180px;
    transform: rotate(-90deg);
    font-weight: bold;
    color: #1f3b73;
}

.right-axis {
    position: absolute;
    right: -140px;
    top: 180px;
    transform: rotate(90deg);
    font-weight: bold;
    color: #1f3b73;
}

/* Y AXIS */
.y-left, .y-right {
    position: absolute;
    top: 20px;
    height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
}

.y-left { left: -40px; }
.y-right { right: -55px; }

/* CHART */
.chart {
    height: 320px;
    margin-top: 30px;
    border-left: 2px solid #bbb;
    border-bottom: 2px solid #bbb;
    border-right: 2px solid #bbb;
    position: relative;

    background-image: linear-gradient(to top, #e6e6e6 1px, transparent 1px);
    background-size: 100% 64px;
}

/* TOOLTIP */
#tooltip {
    position: absolute;
    background: #1f3b73;
    color: white;
    padding: 6px 8px;
    font-size: 12px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: 0.15s;
}

/* FOOTER */
.bottom-title {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
    color: #1f3b73;
}

.source {
    text-align: center;
    font-size: 12px;
    margin-top: 6px;
    color: #555;
}
</style>
</head>

<body>

<div class="title">ACCUMULATED PRECIPITATION – JULY 2025 STORM</div>

<div class="wrapper">

<div class="left-axis">PRECIPITATION (inches)</div>
<div class="right-axis">REFERENCE (%)</div>

<div class="y-left">
  <div>10</div>
  <div>8</div>
  <div>6</div>
  <div>4</div>
  <div>2</div>
  <div>0</div>
</div>

<div class="y-right">
  <div>100%</div>
  <div>80%</div>
  <div>60%</div>
  <div>40%</div>
  <div>20%</div>
  <div>0%</div>
</div>

<div class="chart" id="chart"></div>

<div class="bottom-title">Accumulated Precipitation (July 12–15, 2025)</div>
<div class="source">Source: NOAA NCEI – Station USC00446656 (Petersburg, VA)</div>

</div>

<div id="tooltip"></div>

<script>

// DATA
const data = [
    {day: "Jul 12", acc: 0.46, normal: 0.10},
    {day: "Jul 13", acc: 5.60, normal: 0.25},
    {day: "Jul 14", acc: 8.40, normal: 0.40},
    {day: "Jul 15", acc: 8.40, normal: 0.70}
];

const recordValue = 8.37;

// SETUP
const chart = document.getElementById("chart");
const tooltip = document.getElementById("tooltip");

const width = chart.clientWidth;
const height = chart.clientHeight;
const max = 10;

// SVG
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.createElementNS(svgNS, "svg");
svg.setAttribute("width", width);
svg.setAttribute("height", height);
chart.appendChild(svg);

// LINE PATHS
let linePath = "";
let normalPath = "";

// BUILD PATHS
data.forEach((p, i) => {

    const x = (i / (data.length - 1)) * width;
    const y = height - (p.acc / max) * height;
    const yN = height - (p.normal / max) * height;

    if (i === 0) {
        linePath += `M ${x} ${y}`;
        normalPath += `M ${x} ${yN}`;
    } else {
        linePath += ` L ${x} ${y}`;
        normalPath += ` L ${x} ${yN}`;
    }

    // POINT
    const point = document.createElementNS(svgNS, "circle");
    point.setAttribute("cx", x);
    point.setAttribute("cy", y);
    point.setAttribute("r", 5);
    point.setAttribute("fill", "#2f66c0");

    // HOVER AREA (bigger target)
    const hover = document.createElementNS(svgNS, "circle");
    hover.setAttribute("cx", x);
    hover.setAttribute("cy", y);
    hover.setAttribute("r", 12);
    hover.setAttribute("fill", "transparent");

    hover.addEventListener("mousemove", (e) => {
        tooltip.style.opacity = 1;
        tooltip.style.left = e.pageX + 10 + "px";
        tooltip.style.top = e.pageY - 30 + "px";
        tooltip.innerHTML = `
            <strong>${p.day}</strong><br>
            ${p.acc} in accumulated
        `;
    });

    hover.addEventListener("mouseleave", () => {
        tooltip.style.opacity = 0;
    });

    svg.appendChild(point);
    svg.appendChild(hover);
});

// AREA
let areaPath = linePath + ` L ${width} ${height} L 0 ${height} Z`;

const area = document.createElementNS(svgNS, "path");
area.setAttribute("d", areaPath);
area.setAttribute("fill", "rgba(47,102,192,0.15)");
svg.appendChild(area);

// MAIN LINE
const line = document.createElementNS(svgNS, "path");
line.setAttribute("d", linePath);
line.setAttribute("stroke", "#2f66c0");
line.setAttribute("stroke-width", "3");
line.setAttribute("fill", "none");
svg.appendChild(line);

// NORMAL LINE
const normal = document.createElementNS(svgNS, "path");
normal.setAttribute("d", normalPath);
normal.setAttribute("stroke", "#8b5a2b");
normal.setAttribute("stroke-width", "2");
normal.setAttribute("fill", "none");
svg.appendChild(normal);

// RECORD LINE
const recordY = height - (recordValue / max) * height;

const record = document.createElementNS(svgNS, "line");
record.setAttribute("x1", 0);
record.setAttribute("x2", width);
record.setAttribute("y1", recordY);
record.setAttribute("y2", recordY);
record.setAttribute("stroke", "red");
record.setAttribute("stroke-dasharray", "5,5");
svg.appendChild(record);

</script>

</body>
</html>
